# DM45 common configuration
# Applied to all three build targets (left, right, dongle)

# Disable PHY 2Mbps to improve BLE pairing reliability
CONFIG_BT_CTLR_PHY_2M=n

# Enable passkey entry for compatibility with stricter hosts (e.g. ThinkPad)
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# Stronger TX power for better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Allow peripherals to sleep to save battery
CONFIG_ZMK_SLEEP=y
CONFIG_PM_DEVICE=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_EXT_POWER=y
