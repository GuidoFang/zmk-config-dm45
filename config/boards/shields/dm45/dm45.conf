# DM45 — base configuration for all three targets (left, right, dongle)
#
# Sibling-specific overrides live in dm45_left.conf / dm45_right.conf /
# dm45_dongle.conf.  This matches the Solfe pattern where the base
# config enables sleep and the dongle stays awake naturally via USB.

# Allow deep sleep when idle (dongle stays awake via USB activity)
CONFIG_ZMK_SLEEP=y
CONFIG_PM_DEVICE=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_EXT_POWER=y

# Improve BLE pairing reliability
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# Stronger TX power for reliable BLE connections
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
