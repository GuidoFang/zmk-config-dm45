# DM45 BLE central dongle — nice!nano v2
#
# Extends dm45.conf with dongle-specific settings.
# Matches the Solfe central dongle .conf pattern.

# Dongle mode: two peripheral halves
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# 2 peripherals + 5 Bluetooth profiles = 7 total
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# ZMK Studio support (requires studio-rpc-usb-uart snippet in build.yaml)
CONFIG_ZMK_STUDIO=y
