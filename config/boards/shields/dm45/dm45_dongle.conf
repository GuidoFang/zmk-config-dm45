# DM45 BLE central dongle — Seeed XIAO nRF52840
#
# The dongle acts as the BLE central: it connects to both peripheral
# halves and presents the combined keyboard to the host over USB.
# ZMK Studio is enabled so the keymap can be changed live via the
# ZMK Studio web app / desktop client.

# BLE central with up to 2 peripherals (left + right halves)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Keep the dongle awake — it's USB-powered, battery is irrelevant
CONFIG_ZMK_SLEEP=n

# Stronger TX power for better BLE range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ZMK Studio support (unlicensed — anyone can edit, no lock)
CONFIG_ZMK_STUDIO=y
